version: "3.9"

services:
  aegis:
    build:
      context: .
      target: production
    env_file: .env
    environment:
      - AEGIS_RPC_URL=${AEGIS_RPC_URL}
      - AEGIS_CHAIN_ID=${AEGIS_CHAIN_ID:-}
      - AEGIS_AI_ENABLED=${AEGIS_AI_ENABLED:-false}
    command: ["doctor"]

  scan:
    build:
      context: .
      target: with-ai
    env_file: .env
    entrypoint: ["aegis", "scan"]
